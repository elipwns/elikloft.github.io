name: Update SPY Data

on:
  schedule:
    - cron: '0 22 * * 1-5'  # weekdays 10pm UTC (~6pm ET, after market close)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch SPY historical data
        run: |
          python3 - <<'EOF'
          import urllib.request, json, time
          from datetime import date

          period1 = int(time.mktime((2019, 1, 1, 0, 0, 0, 0, 0, 0)))
          period2 = int(time.time())
          url = (
              f"https://query1.finance.yahoo.com/v8/finance/chart/SPY"
              f"?interval=1d&period1={period1}&period2={period2}"
          )

          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.load(resp)

          result = data["chart"]["result"][0]
          timestamps = result["timestamp"]
          adj = result["indicators"].get("adjclose", [{}])[0].get("adjclose")
          closes = adj if adj else result["indicators"]["quote"][0]["close"]

          entries = []
          for ts, price in zip(timestamps, closes):
              if price is not None:
                  d = date.fromtimestamp(ts).isoformat()
                  entries.append([d, round(price, 2)])

          with open("401k/spy-data.json", "w") as f:
              json.dump(entries, f, separators=(",", ":"))

          print(f"Wrote {len(entries)} entries, latest: {entries[-1]}")
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 401k/spy-data.json
          git diff --cached --quiet || git commit -m "Update SPY data [skip ci]"
          git push
